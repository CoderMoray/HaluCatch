name: Sync to AtomGit

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to AtomGit
        run: |
          git remote add atomgit https://${{ secrets.ATOMGIT_USERNAME }}:${{ secrets.ATOMGIT_TOKEN }}@atomgit.com/CoderMoray/HaluCatch.git 2>/dev/null || true
          git push atomgit main --tags
