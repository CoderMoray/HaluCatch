name: Sync agentskills

on:
  push:
    branches: [main]

# 权限：允许 Actions 推送到仓库
permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install skills-ref
        run: pip install skills-ref pyyaml

      - name: Build & Push agentskills
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/build-agentskills.sh
