<svg viewBox="0 0 680 400" role="img" aria-label="HaluCatch 三版报告对比" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .t { font: 14px/1.6 system-ui, sans-serif; fill: #2C2C2A; }
      .ts { font: 12px/1.6 system-ui, sans-serif; fill: #888880; }
      .th { font: 500 14px/1.6 system-ui, sans-serif; fill: #2C2C2A; }
    </style>
  </defs>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" style="font: 500 15px system-ui; fill: #2C2C2A;">HaluCatch · 三版报告对比</text>
  <text x="340" y="56" text-anchor="middle" style="font: 13px system-ui; fill: #888880;">同一份审查，三种视角，覆盖不同读者</text>

  <!-- Left card: 专业版 -->
  <rect x="40" y="80" width="190" height="280" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="135" y="112" text-anchor="middle" style="font: 500 14px system-ui; fill: #185FA5;">专业版</text>
  <text x="135" y="130" text-anchor="middle" style="font: 12px system-ui; fill: #0C447C;">给开发者 / 数据分析师</text>
  <line x1="56" y1="138" x2="214" y2="138" stroke="#185FA5" stroke-width="0.5" opacity="0.3"/>
  <g style="font: 12px/2.2 system-ui; fill: #2C2C2A;">
    <circle cx="60" cy="158" r="2.5" fill="#185FA5"/><text x="72" y="162">审查发现表格</text>
    <circle cx="60" cy="180" r="2.5" fill="#185FA5"/><text x="72" y="184">风险矩阵总览</text>
    <circle cx="60" cy="202" r="2.5" fill="#185FA5"/><text x="72" y="206">评级分数</text>
    <circle cx="60" cy="224" r="2.5" fill="#185FA5"/><text x="72" y="228">行动清单</text>
    <circle cx="60" cy="246" r="2.5" fill="#185FA5"/><text x="72" y="250">已知局限说明</text>
    <circle cx="60" cy="268" r="2.5" fill="#185FA5"/><text x="72" y="272">数据来源索引</text>
  </g>
  <rect x="56" y="282" width="158" height="20" rx="4" fill="#185FA5" opacity="0.1"/>
  <text x="135" y="296" text-anchor="middle" style="font: 11px system-ui; fill: #185FA5;">默认不展示，按需查看</text>

  <!-- Middle card: 通俗版 -->
  <rect x="245" y="80" width="190" height="280" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="112" text-anchor="middle" style="font: 500 14px system-ui; fill: #0F6E56;">通俗版</text>
  <text x="340" y="130" text-anchor="middle" style="font: 12px system-ui; fill: #085041;">给业务方 / 非技术人员</text>
  <line x1="261" y1="138" x2="419" y2="138" stroke="#0F6E56" stroke-width="0.5" opacity="0.3"/>
  <g style="font: 12px/2.2 system-ui; fill: #2C2C2A;">
    <circle cx="265" cy="158" r="2.5" fill="#0F6E56"/><text x="277" y="162">专业术语全部翻译为白话</text>
    <circle cx="265" cy="180" r="2.5" fill="#0F6E56"/><text x="277" y="184">保留 🔴🟠🟡🟢 风险等级</text>
    <circle cx="265" cy="202" r="2.5" fill="#0F6E56"/><text x="277" y="206">核心结论卡片（TL;DR）</text>
    <circle cx="265" cy="224" r="2.5" fill="#0F6E56"/><text x="277" y="228">不出现 β / p-value 等术语</text>
    <circle cx="265" cy="246" r="2.5" fill="#0F6E56"/><text x="277" y="250">对话中直接展示</text>
  </g>
  <rect x="261" y="282" width="158" height="20" rx="4" fill="#0F6E56" opacity="0.1"/>
  <text x="340" y="296" text-anchor="middle" style="font: 11px system-ui; fill: #0F6E56;">对话默认输出此版本</text>

  <!-- Right card: 行动版 -->
  <rect x="450" y="80" width="190" height="280" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="545" y="112" text-anchor="middle" style="font: 500 14px system-ui; fill: #534AB7;">行动版</text>
  <text x="545" y="130" text-anchor="middle" style="font: 12px system-ui; fill: #3C3489;">给修复执行者</text>
  <line x1="466" y1="138" x2="624" y2="138" stroke="#534AB7" stroke-width="0.5" opacity="0.3"/>
  <g style="font: 12px/2.2 system-ui; fill: #2C2C2A;">
    <circle cx="470" cy="158" r="2.5" fill="#534AB7"/><text x="482" y="162">每条风险的修复方案</text>
    <circle cx="470" cy="180" r="2.5" fill="#534AB7"/><text x="482" y="184">feedback.md 验证模板</text>
    <circle cx="470" cy="202" r="2.5" fill="#534AB7"/><text x="482" y="206">修复后验证检查点</text>
    <circle cx="470" cy="224" r="2.5" fill="#534AB7"/><text x="482" y="228">参数化 / validate / 骨架脚本</text>
    <circle cx="470" cy="246" r="2.5" fill="#534AB7"/><text x="482" y="250">修复包保存路径提示</text>
  </g>
  <rect x="466" y="282" width="158" height="20" rx="4" fill="#534AB7" opacity="0.1"/>
  <text x="545" y="296" text-anchor="middle" style="font: 11px system-ui; fill: #534AB7;">用户选"修"后生成</text>

  <!-- Bottom note -->
  <text x="340" y="385" text-anchor="middle" style="font: 12px system-ui; fill: #888;">三份文件同时生成存盘，对话中按需要展示对应版本</text>
</svg>
