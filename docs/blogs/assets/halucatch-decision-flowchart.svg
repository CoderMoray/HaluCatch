<svg viewBox="-40 0 720 930" role="img" aria-label="HaluCatch 执行决策流程图" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font-family: system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .ths { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; fill: #2C2C2A; }
      .edge { fill: none; stroke: #888780; stroke-width: 1.2; }
      .edge-dash { fill: none; stroke: #B4B2A9; stroke-width: 0.8; stroke-dasharray: 4 3; }
    </style>
  </defs>

  <!-- ============ ENTRY ============ -->
  <rect x="230" y="32" width="220" height="44" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="54" text-anchor="middle" dominant-baseline="central">用户调用 HaluCatch</text>

  <line class="edge" x1="340" y1="76" x2="340" y2="100" marker-end="url(#arrow)"/>

  <!-- ============ PATH CHECK ============ -->
  <polygon points="340,100 415,130 340,160 265,130" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="340" y="130" text-anchor="middle" dominant-baseline="central">路径存在?</text>

  <line class="edge" x1="265" y1="130" x2="150" y2="130" marker-end="url(#arrow)"/>
  <rect x="30" y="108" width="120" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="th" x="90" y="130" text-anchor="middle" dominant-baseline="central">报错退出</text>
  <text class="ts" x="215" y="122" text-anchor="middle">否</text>

  <line class="edge" x1="340" y1="160" x2="340" y2="186" marker-end="url(#arrow)"/>

  <!-- ============ MODE CHECK ============ -->
  <polygon points="340,186 415,216 340,246 265,216" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="340" y="216" text-anchor="middle" dominant-baseline="central">执行模式?</text>

  <line class="edge" x1="415" y1="216" x2="490" y2="216" marker-end="url(#arrow)"/>
  <text class="ts" x="452" y="208">仅校验</text>
  <rect x="496" y="194" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ths" x="566" y="208" text-anchor="middle" dominant-baseline="central">L1 脚本扫描</text>
  <text class="ts" x="566" y="226" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">--validate 模式</text>

  <line class="edge" x1="566" y1="238" x2="566" y2="260" marker-end="url(#arrow)"/>
  <rect x="518" y="264" width="96" height="34" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="ts" x="566" y="283" text-anchor="middle" dominant-baseline="central">结束</text>

  <line class="edge" x1="340" y1="246" x2="340" y2="276" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 0: CLASSIFY ============ -->
  <rect x="230" y="280" width="220" height="44" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="294" text-anchor="middle" dominant-baseline="central">Phase 0: 技能分类</text>
  <text class="ts" x="340" y="313" text-anchor="middle" dominant-baseline="central" fill="#534AB7">含 .py / .xlsx / pd.read_ ?</text>

  <line class="edge" x1="290" y1="324" x2="200" y2="356" marker-end="url(#arrow)"/>
  <line class="edge" x1="390" y1="324" x2="480" y2="356" marker-end="url(#arrow)"/>

  <rect x="100" y="360" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="190" y="375" text-anchor="middle" dominant-baseline="central">代码工程型</text>
  <text class="ts" x="190" y="395" text-anchor="middle" dominant-baseline="central" fill="#185FA5">L2+L3 四维评估</text>

  <rect x="400" y="360" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="490" y="375" text-anchor="middle" dominant-baseline="central">纯方法论型</text>
  <text class="ts" x="490" y="395" text-anchor="middle" dominant-baseline="central" fill="#185FA5">L3 方法论评估</text>

  <!-- converge -->
  <line class="edge" x1="190" y1="404" x2="190" y2="430"/>
  <line class="edge" x1="190" y1="430" x2="340" y2="430"/>
  <line class="edge" x1="490" y1="404" x2="490" y2="430"/>
  <line class="edge" x1="490" y1="430" x2="340" y2="430"/>
  <line class="edge" x1="340" y1="430" x2="340" y2="462" marker-end="url(#arrow)"/>

  <!-- ============ L2+L3 EVALUATION ============ -->
  <rect x="200" y="462" width="280" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="484" text-anchor="middle" dominant-baseline="central">L2 脚本基线 + L3 AI 补充</text>
  <text class="ts" x="340" y="506" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">地基 · 代码 · 规则 · 护栏 (四维全覆盖)</text>

  <line class="edge" x1="340" y1="518" x2="340" y2="548" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 3: REPORTS ============ -->
  <rect x="210" y="552" width="260" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="574" text-anchor="middle" dominant-baseline="central">Phase 3: 三版报告生成</text>
  <text class="ts" x="340" y="596" text-anchor="middle" dominant-baseline="central" fill="#534AB7">专业版 / 通俗版 / AI 行动版 → 落盘</text>

  <line class="edge" x1="340" y1="608" x2="340" y2="638" marker-end="url(#arrow)"/>

  <!-- ============ FIX DECISION ============ -->
  <polygon points="340,638 405,664 340,690 275,664" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="340" y="664" text-anchor="middle" dominant-baseline="central">是否修复?</text>

  <!-- 不修 -->
  <line class="edge" x1="405" y1="664" x2="520" y2="664" marker-end="url(#arrow)"/>
  <text class="ts" x="460" y="656">不修</text>
  <rect x="530" y="642" width="80" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="th" x="570" y="666" text-anchor="middle" dominant-baseline="central">结束</text>

  <!-- 修 → 生成修复方案 -->
  <line class="edge" x1="275" y1="664" x2="160" y2="664" marker-end="url(#arrow)"/>
  <text class="ts" x="222" y="656">修</text>
  <rect x="40" y="642" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ths" x="100" y="666" text-anchor="middle" dominant-baseline="central">生成修复方案</text>

  <!-- ============ USER CHOICE SUB-DECISION ============ -->
  <line class="edge" x1="100" y1="686" x2="100" y2="710" marker-end="url(#arrow)"/>

  <polygon points="100,710 155,740 100,770 45,740" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="100" y="740" text-anchor="middle" dominant-baseline="central">用户选择?</text>

  <!-- 执行 → 向下 -->
  <line class="edge" x1="100" y1="770" x2="100" y2="796" marker-end="url(#arrow)"/>
  <text class="ts" x="110" y="786">执行</text>
  <rect x="30" y="800" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="ths" x="100" y="824" text-anchor="middle" dominant-baseline="central">AI 按方案修复</text>

  <!-- 重新审查闭环：虚线沿左侧边缘弯曲回到入口 -->
  <path d="M30 822 L10 822 L10 54 L220 54" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="10" y="450" text-anchor="end" dominant-baseline="central" fill="#888780" transform="rotate(-90, 10, 450)">重新审查</text>

  <!-- 不执行 → 向右合并到结束 -->
  <path d="M155 740 L570 740 L570 684" fill="none" class="edge" marker-end="url(#arrow)"/>
  <text class="ts" x="270" y="732">不执行</text>

  <!-- 建议 → 向左虚线回弯到生成修复方案 -->
  <line class="edge" x1="45" y1="740" x2="20" y2="740"/>
  <path d="M20 740 L20 662 L40 662" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text class="ts" x="24" y="704" dominant-baseline="central" fill="#888780">建议</text>

  <!-- ============ LEGEND (text inside color blocks) ============ -->
  <g transform="translate(171, 880)">
    <rect x="0" y="0" width="70" height="22" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="35" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #185FA5;" dominant-baseline="central">AI 执行</text>

    <rect x="82" y="0" width="70" height="22" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="117" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #534AB7;" dominant-baseline="central">输出/报告</text>

    <rect x="164" y="0" width="58" height="22" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="193" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #854F0B;" dominant-baseline="central">决策点</text>

    <rect x="234" y="0" width="46" height="22" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="257" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #0F6E56;" dominant-baseline="central">脚本</text>

    <rect x="292" y="0" width="46" height="22" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="315" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #A32D2D;" dominant-baseline="central">终止</text>
  </g>
</svg>
