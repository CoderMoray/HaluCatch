<svg viewBox="0 0 680 730" role="img" aria-label="HaluCatch 执行决策流程图" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t { font-family: system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .ths { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; fill: #2C2C2A; }
      .edge { fill: none; stroke: #888780; stroke-width: 1.2; }
    </style>
  </defs>

  <!-- ============ ENTRY ============ -->
  <rect x="230" y="32" width="220" height="44" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="56" text-anchor="middle" dominant-baseline="central">用户调用 HaluCatch</text>
  <line class="edge" x1="340" y1="76" x2="340" y2="100" marker-end="url(#arrow)"/>

  <!-- ============ DECISION 1: 路径存在? ============ -->
  <polygon points="340,100 410,130 340,160 270,130" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="340" y="130" text-anchor="middle" dominant-baseline="central">路径存在?</text>

  <!-- No branch -->
  <line class="edge" x1="270" y1="130" x2="160" y2="130" marker-end="url(#arrow)"/>
  <text class="ts" x="220" y="120">否</text>
  <rect x="40" y="108" width="120" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="th" x="100" y="132" text-anchor="middle" dominant-baseline="central">报错退出</text>

  <!-- Yes branch -->
  <line class="edge" x1="340" y1="160" x2="340" y2="186" marker-end="url(#arrow)"/>

  <!-- ============ DECISION 2: 执行模式 ============ -->
  <polygon points="340,186 410,216 340,246 270,216" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="340" y="216" text-anchor="middle" dominant-baseline="central">执行模式?</text>

  <!-- 仅校验 branch -->
  <line class="edge" x1="410" y1="216" x2="490" y2="216" marker-end="url(#arrow)"/>
  <text class="ts" x="452" y="208">仅校验</text>
  <rect x="496" y="194" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ths" x="566" y="208" text-anchor="middle" dominant-baseline="central">L1 脚本扫描</text>
  <text class="ts" x="566" y="226" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">--validate 模式</text>

  <line class="edge" x1="566" y1="238" x2="566" y2="260" marker-end="url(#arrow)"/>
  <rect x="518" y="264" width="96" height="34" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="ts" x="566" y="283" text-anchor="middle" dominant-baseline="central">结束</text>

  <!-- 完整审查 branch -->
  <line class="edge" x1="340" y1="246" x2="340" y2="276" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 0: 技能分类 ============ -->
  <rect x="220" y="280" width="240" height="48" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="300" text-anchor="middle" dominant-baseline="central">Phase 0: 技能分类</text>
  <text class="ts" x="340" y="319" text-anchor="middle" dominant-baseline="central" fill="#534AB7">含 .py / .xlsx / pd.read_ ?</text>

  <!-- Two output branches -->
  <line class="edge" x1="290" y1="328" x2="200" y2="360" marker-end="url(#arrow)"/>
  <line class="edge" x1="390" y1="328" x2="480" y2="360" marker-end="url(#arrow)"/>

  <rect x="100" y="364" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="190" y="380" text-anchor="middle" dominant-baseline="central">数据驱动型</text>
  <text class="ts" x="190" y="398" text-anchor="middle" dominant-baseline="central" fill="#185FA5">L2 脚本 + L3 AI 评估</text>

  <rect x="400" y="364" width="180" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="490" y="380" text-anchor="middle" dominant-baseline="central">纯方法论型</text>
  <text class="ts" x="490" y="398" text-anchor="middle" dominant-baseline="central" fill="#185FA5">L3 AI 方法论评估</text>

  <!-- Converge -->
  <line class="edge" x1="190" y1="408" x2="190" y2="434"/>
  <line class="edge" x1="190" y1="434" x2="340" y2="434" marker-end="url(#arrow)"/>
  <line class="edge" x1="490" y1="408" x2="490" y2="434"/>
  <line class="edge" x1="490" y1="434" x2="340" y2="434"/>

  <!-- ============ PHASE 1-2: 四维评估 ============ -->
  <rect x="200" y="442" width="280" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="464" text-anchor="middle" dominant-baseline="central">L2 脚本基线 + L3 AI 补充</text>
  <text class="ts" x="340" y="486" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">地基 · 代码 · 规则 · 护栏 (四维全覆盖)</text>

  <!-- ============ PHASE 3: 三版报告 ============ -->
  <line class="edge" x1="340" y1="498" x2="340" y2="528" marker-end="url(#arrow)"/>
  <rect x="210" y="532" width="260" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="554" text-anchor="middle" dominant-baseline="central">Phase 3: 三版报告生成</text>
  <text class="ts" x="340" y="574" text-anchor="middle" dominant-baseline="central" fill="#534AB7">专业版 / 通俗版 / AI 行动版 → 落盘</text>

  <!-- ============ DECISION 3: 修复? ============ -->
  <line class="edge" x1="340" y1="588" x2="340" y2="614" marker-end="url(#arrow)"/>
  <polygon points="340,614 405,640 340,666 275,640" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="340" y="640" text-anchor="middle" dominant-baseline="central">是否修复?</text>

  <!-- 修 -->
  <line class="edge" x1="275" y1="640" x2="160" y2="640" marker-end="url(#arrow)"/>
  <text class="ts" x="222" y="632">修</text>
  <rect x="40" y="618" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ths" x="100" y="642" text-anchor="middle" dominant-baseline="central">生成修复方案</text>

  <!-- 不修 -->
  <line class="edge" x1="405" y1="640" x2="520" y2="640" marker-end="url(#arrow)"/>
  <text class="ts" x="460" y="632">不修</text>
  <rect x="530" y="618" width="80" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="th" x="570" y="642" text-anchor="middle" dominant-baseline="central">结束</text>

  <!-- ============ LEGEND ============ -->
  <rect x="40" y="696" width="16" height="12" rx="3" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="ts" x="62" y="708" dominant-baseline="central">AI 执行</text>
  <rect x="140" y="696" width="16" height="12" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="ts" x="162" y="708" dominant-baseline="central">输出 / 报告</text>
  <rect x="250" y="696" width="16" height="12" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ts" x="272" y="708" dominant-baseline="central">决策点</text>
  <rect x="340" y="696" width="16" height="12" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ts" x="362" y="708" dominant-baseline="central">脚本执行</text>
  <rect x="440" y="696" width="16" height="12" rx="3" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="ts" x="462" y="708" dominant-baseline="central">终止 / 报错</text>
</svg>
