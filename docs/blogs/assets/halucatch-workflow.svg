<svg viewBox="-40 0 720 780" role="img" aria-label="HaluCatch 审查工作流总览" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .t  { font-family: system-ui, sans-serif; font-size: 14px; fill: #2C2C2A; }
      .ts { font-family: system-ui, sans-serif; font-size: 12px; fill: #5F5E5A; }
      .th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #2C2C2A; }
      .ths { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 500; fill: #2C2C2A; }
      .edge { fill: none; stroke: #888780; stroke-width: 1.2; }
    </style>
  </defs>

  <!-- ============ TITLE ============ -->
  <text x="340" y="36" text-anchor="middle" style="font: 500 15px system-ui; fill: #2C2C2A;">HaluCatch · 审查工作流</text>
  <text class="ts" x="340" y="56" text-anchor="middle">输入 Skill → 四维评估 → 三版报告 → 闭环修复</text>

  <!-- ============ ENTRY ============ -->
  <rect x="230" y="80" width="220" height="44" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="102" text-anchor="middle" dominant-baseline="central">用户调用 HaluCatch</text>

  <line class="edge" x1="340" y1="124" x2="340" y2="148" marker-end="url(#arrow)"/>

  <!-- ============ PHASE 1: SCAN ============ -->
  <rect x="220" y="152" width="240" height="44" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="164" text-anchor="middle" dominant-baseline="central">Phase 1: 文件扫描</text>
  <text class="ts" x="340" y="184" text-anchor="middle" dominant-baseline="central" fill="#185FA5">halucatch_core.py --validate</text>

  <line class="edge" x1="340" y1="196" x2="340" y2="222" marker-end="url(#arrow)"/>

  <!-- ============ DECISION: CLASSIFY ============ -->
  <polygon points="340,222 410,252 340,282 270,252" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="340" y="252" text-anchor="middle" dominant-baseline="central">Phase 2: 技能分类?</text>

  <line class="edge" x1="290" y1="282" x2="200" y2="314" marker-end="url(#arrow)"/>
  <line class="edge" x1="390" y1="282" x2="480" y2="314" marker-end="url(#arrow)"/>

  <rect x="80" y="318" width="200" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="180" y="340" text-anchor="middle" dominant-baseline="central">代码工程型</text>

  <rect x="400" y="318" width="200" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="500" y="340" text-anchor="middle" dominant-baseline="central">纯方法论型</text>

  <!-- converge -->
  <line class="edge" x1="180" y1="362" x2="180" y2="388"/>
  <line class="edge" x1="180" y1="388" x2="340" y2="388"/>
  <line class="edge" x1="500" y1="362" x2="500" y2="388"/>
  <line class="edge" x1="500" y1="388" x2="340" y2="388"/>
  <line class="edge" x1="340" y1="388" x2="340" y2="416" marker-end="url(#arrow)"/>

  <!-- ============ EVALUATION ============ -->
  <rect x="200" y="420" width="280" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="th" x="340" y="438" text-anchor="middle" dominant-baseline="central">四维评估</text>
  <text class="ts" x="340" y="458" text-anchor="middle" dominant-baseline="central" fill="#185FA5">地基 · 代码 · 规则 · 护栏</text>

  <line class="edge" x1="340" y1="476" x2="340" y2="504" marker-end="url(#arrow)"/>

  <!-- ============ REPORT ============ -->
  <rect x="210" y="508" width="260" height="56" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text class="th" x="340" y="526" text-anchor="middle" dominant-baseline="central">Phase 3: 三版报告生成</text>
  <text class="ts" x="340" y="546" text-anchor="middle" dominant-baseline="central" fill="#534AB7">专业版 / 通俗版 / AI 行动版</text>

  <line class="edge" x1="340" y1="564" x2="340" y2="590" marker-end="url(#arrow)"/>

  <!-- ============ FIX DECISION ============ -->
  <polygon points="340,590 405,618 340,646 275,618" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text class="ths" x="340" y="618" text-anchor="middle" dominant-baseline="central">修复?</text>

  <!-- 修 -->
  <line class="edge" x1="275" y1="618" x2="160" y2="618" marker-end="url(#arrow)"/>
  <text class="ts" x="222" y="610">修</text>
  <rect x="40" y="596" width="120" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text class="ths" x="100" y="618" text-anchor="middle" dominant-baseline="central">生成修复方案</text>

  <line class="edge" x1="100" y1="640" x2="100" y2="664" marker-end="url(#arrow)"/>
  <rect x="30" y="668" width="140" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text class="ths" x="100" y="690" text-anchor="middle" dominant-baseline="central">AI 按方案修复</text>

  <!-- 修复后重新审查回环 -->
  <path d="M30 712 L10 712 L10 104 L220 104" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text class="ts" x="10" y="400" text-anchor="end" dominant-baseline="central" fill="#888780" transform="rotate(-90, 10, 400)">重新审查</text>

  <!-- 不修 -->
  <line class="edge" x1="405" y1="618" x2="560" y2="618" marker-end="url(#arrow)"/>
  <text class="ts" x="480" y="610">不修</text>
  <rect x="560" y="596" width="80" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text class="th" x="600" y="618" text-anchor="middle" dominant-baseline="central">结束</text>

  <!-- ============ LEGEND ============ -->
  <g transform="translate(171, 735)">
    <rect x="0" y="0" width="70" height="22" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="35" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #185FA5;" dominant-baseline="central">AI 执行</text>

    <rect x="82" y="0" width="70" height="22" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="117" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #534AB7;" dominant-baseline="central">输出/报告</text>

    <rect x="164" y="0" width="58" height="22" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="193" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #854F0B;" dominant-baseline="central">决策点</text>

    <rect x="234" y="0" width="46" height="22" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="257" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #0F6E56;" dominant-baseline="central">脚本</text>

    <rect x="292" y="0" width="46" height="22" rx="6" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
    <text x="315" y="13" text-anchor="middle" style="font: 500 11px system-ui; fill: #A32D2D;" dominant-baseline="central">终止</text>
  </g>
</svg>
