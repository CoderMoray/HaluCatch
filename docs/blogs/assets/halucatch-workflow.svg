<svg viewBox="0 0 680 580" role="img" aria-label="HaluCatch 工作流总览图" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" style="font: 500 15px system-ui; fill: #2C2C2A;">HaluCatch · 审查工作流</text>
  <text x="340" y="56" text-anchor="middle" style="font: 13px system-ui; fill: #888880;">输入 Skill 路径 → 四维评估 → 三版报告 → 可选修复</text>

  <!-- Phase 0: 输入 -->
  <rect x="240" y="80" width="200" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="102" text-anchor="middle" style="font: 500 14px system-ui; fill: #185FA5;">输入 Skill 路径</text>
  <text x="340" y="118" text-anchor="middle" style="font: 12px system-ui; fill: #0C447C;">用户指定待审查的 Skill 目录</text>

  <line x1="340" y1="124" x2="340" y2="148" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Phase 1: 文件扫描 -->
  <rect x="220" y="152" width="240" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="174" text-anchor="middle" style="font: 500 14px system-ui; fill: #185FA5;">Phase 1 · 文件扫描</text>
  <text x="340" y="190" text-anchor="middle" style="font: 12px system-ui; fill: #0C447C;">halucatch_core.py --validate</text>

  <line x1="340" y1="196" x2="340" y2="220" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Phase 2: 技能分类 -->
  <rect x="220" y="224" width="240" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="340" y="246" text-anchor="middle" style="font: 500 14px system-ui; fill: #854F0B;">Phase 2 · 技能分类</text>
  <text x="340" y="262" text-anchor="middle" style="font: 12px system-ui; fill: #633806;">代码工程型 / 纯方法论型</text>

  <line x1="340" y1="268" x2="340" y2="292" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Phase 3: 左分支 代码工程型 -->
  <rect x="40" y="296" width="260" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="170" y="318" text-anchor="middle" style="font: 500 14px system-ui; fill: #0F6E56;">代码工程型</text>
  <text x="170" y="334" text-anchor="middle" style="font: 12px system-ui; fill: #085041;">地基 + 代码 + 规则 + 护栏</text>

  <!-- Phase 3: 右分支 纯方法论型 -->
  <rect x="380" y="296" width="260" height="44" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
  <text x="510" y="318" text-anchor="middle" style="font: 500 14px system-ui; fill: #854F0B;">纯方法论型</text>
  <text x="510" y="334" text-anchor="middle" style="font: 12px system-ui; fill: #633806;">指令完备性 + 可复现性</text>

  <!-- 分支箭头 -->
  <line x1="270" y1="268" x2="170" y2="296" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="4" marker-end="url(#arrow)"/>
  <line x1="410" y1="268" x2="510" y2="296" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="4" marker-end="url(#arrow)"/>

  <!-- 汇合箭头 -->
  <line x1="170" y1="340" x2="340" y2="364" stroke="#0F6E56" stroke-width="0.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="340" x2="340" y2="364" stroke="#854F0B" stroke-width="0.5" marker-end="url(#arrow)"/>

  <!-- Phase 4: 三版报告 -->
  <rect x="180" y="368" width="320" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text x="340" y="390" text-anchor="middle" style="font: 500 14px system-ui; fill: #534AB7;">Phase 4 · 三版报告生成</text>
  <text x="340" y="406" text-anchor="middle" style="font: 12px system-ui; fill: #3C3489;">专业版 / 通俗版 / 行动版</text>

  <line x1="340" y1="412" x2="340" y2="436" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Phase 5: 修复决策 -->
  <rect x="200" y="440" width="280" height="44" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
  <text x="340" y="462" text-anchor="middle" style="font: 500 14px system-ui; fill: #A32D2D;">Phase 5 · 修复决策</text>
  <text x="340" y="478" text-anchor="middle" style="font: 12px system-ui; fill: #791F1F;">用户选择：修 / 不修</text>

  <line x1="340" y1="484" x2="340" y2="510" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="270" y="510" width="140" height="36" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="340" y="532" text-anchor="middle" style="font: 500 13px system-ui; fill: #0F6E56;">审查完成 ✅</text>

  <!-- Phase 4 输出标注 -->
  <g>
    <text x="60" y="360" style="font: 10px system-ui; fill: #534AB7; opacity:0.6;">输出: 专业版(开发者) / 通俗版(业务方) / 行动版(修复)</text>
  </g>

  <text x="36" y="520" style="font: 11px system-ui; fill: #aaa;">L1/L2: 脚本执行  L3: AI 执行</text>
</svg>
