# ── Quick Start ──
quickstart:
  title: Quick Start
  tab_user: 👤 User
  tab_dev: 👨‍💻 Developer

  install:
    step1_title: Install
    step1_desc: Copy the prompt below and send it to your AI to install {name}
    step2_title: Audit a Skill
    step2_desc: Tell your AI which Skill or directory to audit
    step3_title: Read Reports & Decide
    step3_desc: Three reports for different roles — pick the one that fits

  audit_chat:
    user_msg: Please use {name} to audit /my-skill
    ai_scan_msg: |
      📁 Scanning directory...
      📝 Found SKILL.md (120 lines)
      🐍 Found core.py (45 lines)
      📊 Running four-dimensional assessment...
    ai_done_msg: |
      Audit complete. Reports saved in reports/ directory:
      📗 Standard Report — plain language explanation
      📊 Professional Report — structured checklist
      🤖 Action Report — fix instructions for AI

  audit_flow:
    desc: "What the AI will do next:"
    steps:
      - label: Scan Directory
      - label: 4D Assessment
      - label: Generate Reports
      - label: Precise Fixes

  report_cards:
    standard:
      title: Standard
      audience: For Product / Business
      desc: Explains what each issue is, why it matters, and how to fix it — in plain language
    pro:
      title: Professional
      audience: For Engineers / Developers
      desc: Structured checklist with per-dimension scoring, precise to file and line number
    action:
      title: AI Action
      audience: For AI (just tell your AI to read it)
      desc: Fix checklist + verification checkpoints — AI executes step by step
    repair_tip: 💡 Ready to fix? Tell your AI to read the Action Report and execute — it will fix items one by one. Re-audit after to confirm all issues are resolved.

  dev:
    step1_title: Clone Repository
    step2_title: Run Audit
    step3_title: View Reports

