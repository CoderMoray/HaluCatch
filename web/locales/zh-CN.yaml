# ── 报告预览 ──
report_preview:
  title: 审计报告预览
  subtitle: 同一份 Skill，三份视角 — 以下是 HaluCatch 审计自身的真实报告

# ── 快速开始 ──
quickstart:
  title: 快速开始
  tab_user: 👤 普通用户
  tab_dev: 👨‍💻 开发者

  # 安装
  install:
    step1_title: 安装
    step1_desc: 复制下方提示词发给 AI，即可安装 {name}
    step2_title: 审查目标 Skill
    step2_desc: 告诉 AI 你要审查哪个 Skill 或者你的 Skill 所在的文件夹路径
    step3_title: 阅读报告，决定下一步
    step3_desc: 三份报告分别面向不同角色，选择适合你的阅读

  # 审查对话
  audit_chat:
    user_msg: 请用 {name} 审查 /my-skill
    ai_scan_msg: |
      📁 扫描目录...
      📝 发现 SKILL.md (120 行)
      🐍 发现 core.py (45 行)
      📊 开始五维评估...
    ai_done_msg: |
      审查完成。报告已保存在 reports/ 目录：
      📗 标准版 — 用人话解释哪里有问题
      📊 专业版 — 结构化检查清单
      🤖 行动版 — 给 AI 的修复指令

  # 流程
  audit_flow:
    desc: 接下来 AI 会做：
    steps:
      - label: 扫描目录
      - label: 五维评估
      - label: 生成报告
      - label: 精准修复

  # 报告卡片
  report_cards:
    standard:
      title: 标准版
      audience: 给业务 / 产品经理
      desc: 用人话解释每个问题是什么、为什么重要、怎么改
    pro:
      title: 专业版
      audience: 给工程师 / 开发者
      desc: 结构化检查清单，每个维度打分，精确到文件和行号
    action:
      title: AI 行动版
      audience: 给 AI（告知 AI 读取即可）
      desc: 修复清单 + 验证检查点，AI 按步骤执行即可
    repair_tip: 💡 如果决定修复：告知 AI 读取行动版报告并执行，它会按清单逐项修复。修复后重新审查，确认问题清零。

  # 开发者
  dev:
    step1_title: 克隆仓库
    step2_title: 运行审查
    step3_title: 查看报告

