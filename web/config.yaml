# ============================================================
# 快速开始
# ============================================================
quickstart:
  title: 快速开始
  user_tab_label: 👤 普通用户
  dev_tab_label: 👨‍💻 开发者
  # 安装提示词
  user:
    skillhub:                               # (可选) 填了才渲染国内方案卡片
      title: 🇨🇳 国内用户方案
      subtitle: 为国内用户提供 SkillHub 安装提示词
      note: 中文环境 · 免费 · 开箱即用
      prompt: |
        请先检查是否已安装 SkillHub 商店，若未安装，请根据 https://skillhub.cn/install/skillhub.md 安装SkillHub商店，但是只安装CLI，然后安装halucatch技能。若已安装，则直接安装halucatch技能。
    clawhub:                                # (可选) 填了才渲染国际方案卡片
      title: 🌐 国际用户方案
      subtitle: 为国际用户提供 ClawHub 安装提示词
      note: Global AI skill marketplace
      prompt: |
        Before installing anything, inspect the ClawHub skill metadata and setup requirements. If the skill asks you to install a third-party package or CLI, verify its source, maintainer, and package contents before running the install command. Install the skill HaluCatch (@codermoray/halucatch) from ClawHub only after those checks pass. Skill page: https://clawhub.ai/codermoray/skills/halucatch. Keep the work scoped to this skill only. After install, help me finish setup from verified skill metadata. Use only the metadata you can verify from ClawHub; do not invent missing requirements. Ask before making any broader environment changes.
    # 审查流程演示（对话示例）
    audit_chat:
      user_msg: 请用 HaluCatch 审查 /my-skill
      ai_scan_msg: |
        📁 扫描目录...
        📝 发现 SKILL.md (120 行)
        🐍 发现 core.py (45 行)
        📊 开始五维评估...
      ai_done_msg: |
        审查完成。报告已保存在 reports/ 目录：
        📗 标准版 — 用人话解释哪里有问题
        📊 专业版 — 结构化检查清单
        🤖 行动版 — 给 AI 的修复指令
    # 审查流程步骤
    audit_flow:
      - icon: folder
        label: 扫描目录
      - icon: search
        label: 五维评估
      - icon: file
        label: 生成报告
      - icon: edit
        label: 精准修复
    # 报告卡片
    report_cards:
      repair_tip: 💡 如果决定修复：告知 AI 读取行动版报告并执行，它会按清单逐项修复。修复后重新审查，确认问题清零。
  # 开发者
  dev:
    clone_cmd: |
      git clone https://github.com/CoderMoray/HaluCatch.git
      cd HaluCatch
    run_cmds:
      - comment: 自动检测语言（中文/英文）
        cmd: python3 halucatch_core.py --skill-dir /path/to/your-skill
      - comment: 或强制英文输出
        cmd: python3 halucatch_core.py --skill-dir /path/to/your-skill --lang en
      - comment: 或使用包方式
        cmd: python3 -m halucatch --skill-dir /path/to/your-skill
    report_output: |
      # 三份报告自动生成在 reports/ 目录
      reports/HaluCatch-report-YYYY-MM-DD.md        # 专业版
      reports/HaluCatch-report-YYYY-MM-DD-标准版.md  # 标准版
      reports/HaluCatch-report-YYYY-MM-DD-行动版.md  # AI 行动版

