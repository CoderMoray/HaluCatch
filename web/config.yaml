# ============================================================
# 在线体验 Demo（可选，不填则跳过整个区块）
# stages 为对话流程配置，每个阶段包含 ai_message 和 options
# thinking 为可选的思考动画文案列表
# ============================================================
demo:
  title: 在线体验 HaluCatch
  model_name: HaluCatch 1.7
  avatar: 🔮
  stages:
    init:
      ai_message: HaluCatch 已就绪。我可以帮你审查任何 Skill 目录，找出幻觉风险、输出不稳定风险、安全漏洞和逻辑漏洞。你可以使用以下选项快速开始：
      options:
        - text: 好的，请用 HaluCatch 审查这个项目本身
          next: audit
        - text: 这是什么工具？
          next: explain
        - text: 我需要准备什么？
          next: prepare
    explain:
      thinking:
        - 🤔 用户想了解工具功能...
        - 📋 从 HaluCatch 的 SKILL.md 中提取核心能力描述...
        - ✅ 确认：五维度评估（地基/代码/规则/护栏/复杂度）
      ai_message: HaluCatch 自动审查你的 Skill 指令文件，找出幻觉风险、输出不稳定风险、安全漏洞和逻辑漏洞——帮你在 AI 执行前把问题修掉。
      options:
        - text: 明白了，请审查这个项目
          next: audit
    prepare:
      thinking:
        - 🤔 用户询问准备工作...
        - 📂 分析 Skill 目录的标准结构要求...
        - ✅ 确认：需要 SKILL.md + 可选 .py / 数据文件
      ai_message: 你需要准备一个 Skill 目录，里面至少包含 SKILL.md（指令文件）。Skill 目录中如果有 .py 脚本或数据文件，审查会更全面。
      options:
        - text: 好的，开始审查
          next: audit
    audit:
      thinking:
        - 📁 扫描目录结构...
        - 🔍 读取 SKILL.md (340 行, 11 个模块)...
        - 🐍 扫描 Python 模块 (1100+ 行代码)...
        - 🏗️ 评估地基：路径参数化 ✓ / 输入验证 ✗ / 文件发现 ✗
        - 🤖 扫描代码风险：0 个篡改点 ✓
        - 📝 检查规则/方法论：模糊词 0 / 边界定义 ✓ / 异常处理 ✓
        - 🛡️ 检查护栏：输出格式 ✓ / 禁止声明 ✓ / 数据时效性 ✓ / 前提假设 ✓
        - 📊 生成三份报告 (专业版 / 标准版 / 行动版)...
      ai_message: 让我们从审查 HaluCatch 这个 Skill 本身来快速开始。审查完成！已生成三份报告。你可以在右侧查看。整体评级：地基 🟡 / 代码 🟢 / 规则 🟢 / 护栏 🟢
      show_reports: true

