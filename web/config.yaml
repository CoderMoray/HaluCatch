# ============================================================
# FAQ（可选，空数组则跳过整个区块）
# ============================================================
faq:
  title: FAQ
  full_link_label: 查看完整 FAQ →
  full_link_url: FAQ.md
  items:
    - q: HaluCatch 需要联网吗？
      a: 不需要。全程离线运行，仅扫描本地文件夹中的 SKILL.md 和 .py 文件，不会发起任何网络请求。
    - q: HaluCatch 怎么用？
      a: |
        对 AI 说「请用 HaluCatch 审查 /path/to/skill」即可。AI 自动扫描、评估、生成三份报告到 reports/ 目录：
        1. 跑一次审查 → 看通俗版报告了解问题
        2. 打开 -行动版.md → 从第一条开始逐项修复
        3. 修复后重新跑 → 对比分数是否改善
    - q: 我的 Skill 没有 .py 文件，能用吗？
      a: 可以。HaluCatch 会自动分类为「纯方法论型」并跳过地基/代码检查，只评估方法论结构和护栏完整度。
    - q: 审查结果说「护栏薄弱」，怎么修？
      a: 看同目录下的 HaluCatch-report-日期-行动版.md，它逐条列出了修复方案。按清单逐项改，改完后重新审查验证。
    - q: 代码风险检查有哪些规则？
      a: "当前 7 条通用规则：裸 except: pass / 浮点比较 (== 0.0) / 除零风险 / 硬编码阈值 / 路径拼接 / 静默覆盖 / 超时缺失。"
    - q: 能一次审查多个 Skill 吗？
      a: 当前版本暂不支持批量模式。你可以逐个运行。批量功能已在 roadmap 中。

